name: Branch Protection

# Apply branch protection rules to the default branch (main).
# Run automatically when this file lands on main, or trigger manually from the
# Actions tab when you need to re-apply the rules after they have been edited.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/branch-protection.yml"
  workflow_dispatch:

jobs:
  protect:
    name: Apply branch protection rules
    runs-on: ubuntu-latest
    permissions:
      # administration permission is required to manage branch protection rules
      administration: write
      contents: read

    steps:
      - name: Apply branch protection rules to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${REPO}/branches/main/protection \
            --input - <<'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["Build and Test"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": true,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true,
            "lock_branch": false
          }
          EOF
