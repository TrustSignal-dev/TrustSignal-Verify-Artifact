name: TrustSignal Action Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TRUSTSIGNAL_API_KEY: ${{ secrets.TRUSTSIGNAL_API_KEY }}

jobs:
  local-receipt-demo:
    name: "Local Receipt Demo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create demo artifact
        run: |
          mkdir -p demo
          printf 'TrustSignal demo artifact\n' > demo/artifact.txt

      - name: Generate baseline receipt
        id: baseline
        uses: TrustSignal-dev/TrustSignal-Verify-Artifact@v0.2.0
        with:
          mode: local
          path: demo/artifact.txt
          upload_receipt: "false"

      - name: Verify artifact against saved receipt
        id: verify
        uses: TrustSignal-dev/TrustSignal-Verify-Artifact@v0.2.0
        with:
          mode: local
          path: demo/artifact.txt
          receipt: ${{ steps.baseline.outputs.receipt_path }}
          upload_receipt: "false"

      - name: Show local demo outputs
        run: |
          echo "baseline_sha256=${{ steps.baseline.outputs.sha256 }}"
          echo "baseline_receipt=${{ steps.baseline.outputs.receipt_path }}"
          echo "verification_status=${{ steps.verify.outputs.verification_status }}"

  drift-detection-demo:
    name: "Drift Detection Demo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create demo artifact
        run: |
          mkdir -p demo
          printf 'TrustSignal demo artifact\n' > demo/drift.txt

      - name: Generate baseline receipt
        id: baseline
        uses: TrustSignal-dev/TrustSignal-Verify-Artifact@v0.2.0
        with:
          mode: local
          path: demo/drift.txt
          upload_receipt: "false"

      - name: Mutate artifact
        run: |
          printf 'tampered\n' >> demo/drift.txt

      - name: Verify drift is detected
        id: drift
        continue-on-error: true
        uses: TrustSignal-dev/TrustSignal-Verify-Artifact@v0.2.0
        with:
          mode: local
          path: demo/drift.txt
          receipt: ${{ steps.baseline.outputs.receipt_path }}
          upload_receipt: "false"

      - name: Assert drift detection fired
        run: |
          test "${{ steps.drift.outcome }}" = "failure"

  managed-live-demo:
    name: "Managed Mode (Live API)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip managed demo when secret is unavailable
        if: ${{ github.event_name != 'workflow_dispatch' || env.TRUSTSIGNAL_API_KEY == '' }}
        run: echo "Skipping managed live demo because this is not a manual run or TRUSTSIGNAL_API_KEY is not configured."
      - name: Create managed demo artifact
        if: ${{ github.event_name == 'workflow_dispatch' && env.TRUSTSIGNAL_API_KEY != '' }}
        run: |
          mkdir -p demo
          printf 'TrustSignal managed demo artifact\n' > demo/managed.txt

      - name: Verify artifact with TrustSignal
        id: trustsignal
        if: ${{ github.event_name == 'workflow_dispatch' && env.TRUSTSIGNAL_API_KEY != '' }}
        uses: TrustSignal-dev/TrustSignal-Verify-Artifact@v0.2.0
        with:
          mode: managed
          api_base_url: https://api.trustsignal.dev
          api_key: ${{ env.TRUSTSIGNAL_API_KEY }}
          path: demo/managed.txt
          upload_receipt: "false"
      - name: Verify outputs
        if: ${{ github.event_name == 'workflow_dispatch' && env.TRUSTSIGNAL_API_KEY != '' }}
        run: |
          echo "SHA256: ${{ steps.trustsignal.outputs.sha256 }}"
          echo "Receipt: ${{ steps.trustsignal.outputs.receipt_path }}"
          echo "Receipt ID: ${{ steps.trustsignal.outputs.receipt_id }}"
          echo "Status: ${{ steps.trustsignal.outputs.verification_status }}"
