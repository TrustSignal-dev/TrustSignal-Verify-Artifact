name: TrustSignal Verify Artifact
description: Verify build artifacts and issue TrustSignal verification receipts in local or managed mode.
author: TrustSignal
branding:
  icon: shield
  color: blue

inputs:
  path:
    description: Local path to the artifact file or directory to hash and verify.
    required: false
    default: "."
  receipt:
    description: Optional local receipt file path, receipt JSON, or raw SHA-256 hash used for local drift detection.
    required: false
  mode:
    description: Verification mode. Use local for offline receipts or managed for TrustSignal API verification.
    required: false
    default: "local"
  api_base_url:
    description: Base URL for the TrustSignal API. Required in managed mode.
    required: false
  api_key:
    description: API key for the TrustSignal API. Required in managed mode.
    required: false
  upload_receipt:
    description: Whether to upload the generated receipt as a GitHub Actions artifact.
    required: false
    default: "true"
  source:
    description: Source label sent with the verification request.
    required: false
    default: "github-actions"
  fail_on_mismatch:
    description: Fail the action when local drift is detected or managed verification returns a non-valid result.
    required: false
    default: "true"
  artifact_path:
    description: Legacy alias for path.
    required: false
  artifact_hash:
    description: Legacy input for a precomputed SHA-256 digest instead of hashing a local artifact.
    required: false

outputs:
  sha256:
    description: SHA-256 digest of the verified artifact.
  receipt_path:
    description: Local path to the receipt JSON file used or generated by the action.
  mode_used:
    description: The verification mode that ran.
  receipt_id:
    description: TrustSignal receipt identifier when provided by the managed API or loaded receipt.
  verification_status:
    description: Normalized verification status.
  verification_id:
    description: TrustSignal verification identifier or local receipt check identifier.
  status:
    description: Legacy alias for verification_status.
  receipt_signature:
    description: Signed receipt signature when returned by the managed API or loaded receipt.

runs:
  using: node20
  main: dist/index.js
