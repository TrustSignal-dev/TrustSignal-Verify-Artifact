name: TrustSignal Verify Artifact
description: Verify artifacts and check for artifact drift using TrustSignal receipts.
author: TrustSignal
branding:
  icon: shield
  color: blue

inputs:
  api_base_url:
    description: Base URL for the TrustSignal public API. Required when `receipt` is not provided.
    required: false
  api_key:
    description: API key for the TrustSignal public API. Required when `receipt` is not provided.
    required: false
  artifact_path:
    description: Local path to the artifact to hash and verify.
    required: false
  artifact_hash:
    description: Precomputed artifact hash to verify instead of hashing a file.
    required: false
  receipt:
    description: >-
      Optional receipt JSON for local verification (artifact drift check). Accepts either a raw
      SHA-256 hash string or JSON containing artifact hash fields.
    required: false
  source:
    description: Source label for the artifact verification request.
    required: false
    default: github-actions
  fail_on_mismatch:
    description: Fail the action when verification does not return a valid result.
    required: false
    default: "true"

outputs:
  verification_id:
    description: TrustSignal verification identifier returned by the API, or receipt id for local receipt verification.
  status:
    description: Normalized verification status returned by the API or local receipt check result.
  receipt_id:
    description: TrustSignal receipt identifier returned by the API or from the local receipt payload.
  receipt_signature:
    description: Signed receipt signature returned by the API or from the local receipt payload.

runs:
  using: node20
  main: dist/index.js
